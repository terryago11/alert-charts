name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'   # full build every 30 min
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-deploy
  cancel-in-progress: false   # let running build finish; queue next

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 main.py
        # The script tries Google Sheets first; falls back to any local data file in data/.
        # Note: oref.org.il is geo-blocked to Israeli IPs and is not attempted.

      - name: Commit processed.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed.json
          git diff --staged --quiet || git commit -m "chore: update processed.json [skip ci]"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
